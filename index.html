<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Afif!</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            overflow: hidden;
            background-color: #e0f7fa;
            transition: background-color 3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Present Button Screen */
        #gift-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #e0f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease, visibility 1s;
        }
        .click-btn {
            padding: 20px 50px;
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
            background-color: #ff4081;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 64, 129, 0.4);
            animation: bounce 1.5s infinite;
            font-family: inherit;
        }

        /* BY: AAYAN CREATOR CREDIT STYLE */
        #creator-credit {
            position: absolute;
            top: 25px;
            left: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ff4081;
            z-index: 25;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .dark-mode #creator-credit {
            color: #ffeb00;
        }

        /* Fixed Stage Layout */
        #stage {
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 2vh 20px;
            position: relative;
            z-index: 1;
            transition: opacity 1s ease;
        }

        /* Top-Anchored Text Box */
        #text-container {
            background-color: white;
            padding: 12px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 5;
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 4px solid #ff4081;
            margin-top: 1vh;
        }
        .dark-mode #text-container {
            border-color: #ffeb00;
            box-shadow: 0 0 25px rgba(255, 235, 0, 0.5);
        }

        h1 {
            font-size: calc(1.5rem + 1vw); 
            color: #ff4081;
            margin: 0;
            line-height: 1.2;
        }
        .dark-mode #greeting-text {
            color: #d500f9;
        }

        h2 {
            font-size: calc(1rem + 0.5vw);
            color: #00e5ff;
            margin: 4px 0 0 0;
            font-weight: normal;
        }
        .dark-mode h2 {
            color: #ffeb00;
        }

        /* Middle Slideshow Area Layout */
        .slideshow-wrapper {
            position: absolute;
            top: 22vh; 
            bottom: 22vh; 
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 6;
        }

        /* Dynamic Frameless Photo Container */
        #photo-frame {
            height: 100%; 
            width: 100%;
            max-height: 420px; 
            max-width: 600px;  
            position: relative;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #photo-frame.visible {
            opacity: 1;
        }
        
        #photo-frame img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; 
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            position: absolute;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        
        #photo-frame img.active {
            opacity: 1;
        }

        /* Cake Container */
        #cake-container {
            position: absolute;
            bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 4;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #cake-container.show {
            opacity: 1;
            transform: translateY(0);
        }
        .cake {
            width: 140px;
            height: 75px;
            background: #ff80ab;
            border-radius: 15px 15px 0 0;
            position: relative;
            box-shadow: inset 0 12px 0 #f50057, 0 10px 20px rgba(0,0,0,0.15);
        }
        .cake::before {
            content: '';
            position: absolute;
            top: 22px;
            left: 0;
            width: 100%;
            height: 10px;
            background: #fff;
        }
        .table {
            width: 200px;
            height: 12px;
            background: #8d6e63;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Candles Layout */
        .candles {
            display: flex;
            gap: 8px;
            margin-bottom: -4px;
        }
        .candle {
            width: 8px;
            height: 26px;
            background: linear-gradient(#fff, #00e5ff);
            position: relative;
        }
        .flame {
            width: 10px;
            height: 14px;
            background: #ff9100;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -16px;
            left: -1px;
            animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 15px #ff9100;
            transition: opacity 0.3s ease;
        }

        /* Balloon Container */
        #balloon-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 45px;
            height: 60px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            animation: floatUp 5s linear forwards;
        }
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 21px;
            width: 2px;
            height: 25px;
            background-color: #bdbdbd;
        }

        /* Curtains Smooth Transition Setup */
        .curtain {
            position: fixed;
            top: 0;
            width: 50%;
            height: 100%;
            background: #b71c1c;
            background-image: repeating-linear-gradient(to right, #b71c1c, #b71c1c 40px, #9e1c1c 40px, #9e1c1c 80px);
            z-index: 20; 
            transition: transform 2s ease-in-out;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        #curtain-left {
            left: 0;
            transform: translateX(-105%); 
            border-radius: 0 15px 15px 0;
        }
        #curtain-right {
            right: 0;
            transform: translateX(105%); 
            border-radius: 15px 0 0 15px;
        }
        
        body.curtains-closed #curtain-left { transform: translateX(0); }
        body.curtains-closed #curtain-right { transform: translateX(0); }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); scale: 1; }
            50% { transform: translateY(-15px); scale: 1.05; }
        }
        @keyframes flicker {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(10deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="silent-warmup" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD" preload="auto"></audio>
    <audio id="birthday-track" src="afif-birthday.mp3" preload="auto"></audio>

    <div id="gift-screen">
        <button id="main-click-btn" class="click-btn" onclick="openPresent()">Click Me!</button>
    </div>

    <div id="creator-credit">By: Aayan</div>

    <div id="curtain-left" class="curtain"></div>
    <div id="curtain-right" class="curtain"></div>

    <div id="stage">
        <div id="balloon-zone"></div>

        <div id="text-container">
            <h1 id="greeting-text">Happy Birthday Afif!</h1>
            <h2 id="subtitle-text">Happy 5th Birthday!</h2>
        </div>
        
        <div class="slideshow-wrapper">
            <div id="photo-frame">
                <img src="baby1.jpg" alt="Baby Afif 1">
                <img src="baby2.jpg" alt="Baby Afif 2">
                <img src="baby3.jpg" alt="Baby Afif 3">
                
                <img src="age1_a.jpg" alt="Afif Age 1 A">
                <img src="age1_b.jpg" alt="Afif Age 1 B">
                <img src="age1_c.jpg" alt="Afif Age 1 C">
                
                <img src="age2_a.jpg" alt="Afif Age 2 A">
                <img src="age2_b.jpg" alt="Afif Age 2 B">
                <img src="age2_c.jpg" alt="Afif Age 2 C">
                
                <img src="age3_a.jpg" alt="Afif Age 3 A">
                <img src="age3_b.jpg" alt="Afif Age 3 B">
                <img src="age3_c.jpg" alt="Afif Age 3 C">
                
                <img src="age4_a.jpg" alt="Afif Age 4 A">
                <img src="age4_b.jpg" alt="Afif Age 4 B">
            </div>
        </div>
        
        <div id="cake-container">
            <div class="candles">
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
            </div>
            <div class="cake"></div>
            <div class="table"></div>
        </div>
    </div>

    <script>
        const colors = ['#ff1744', '#00e676', '#2979ff', '#ffea00', '#d500f9', '#ff9100'];
        let balloonInterval;
        let slideshowTimeout1, slideshowTimeout2, prePlayTimeout; 
        let isMutedPeriod = true; 
        let slideshowStarted = false; 
        let currentImgIndex = 0;
        let giftScreenActive = true;
        const track = document.getElementById('birthday-track');
        const warmup = document.getElementById('silent-warmup');
        const greetingText = document.getElementById('greeting-text');
        const subtitleText = document.getElementById('subtitle-text');
        const stage = document.getElementById('stage');
        const giftScreen = document.getElementById('gift-screen');
        const balloonZone = document.getElementById('balloon-zone');
        const creatorCredit = document.getElementById('creator-credit');

        const lyrics = [
            { time: 0.0,  text: "🎶 Music Starting... 🎶", sub: "Happy 5th Birthday!" },
            { time: 12.0, text: "Happy Birthday Afif,", sub: "Happy 5th Birthday!" },
            { time: 14.8, text: "Happy Birthday to you!", sub: "Happy 5th Birthday!" },
            { time: 17.8, text: "Happy Birthday, Happy Birthday,", sub: "Happy 5th Birthday!" },
            { time: 20.8, text: "Happy Birthday Afif! 🎂", sub: "Happy 5th Birthday!" },
            { time: 24.5, text: "✨ Let's Celebrate! ✨", sub: "Happy 5th Birthday!" },
            { time: 41.5, text: "Happy Birthday Afif,", sub: "Happy 5th Birthday!" },
            { time: 45.2, text: "Happy Birthday to you!", sub: "Happy 5th Birthday!" },
            { time: 48.8, text: "Happy Birthday, Happy Birthday,", sub: "Happy 5th Birthday!" },
            { time: 52.4, text: "Happy Birthday Afif! 🎈", sub: "Happy 5th Birthday!" },
            { time: 56.5, text: "✨ Happy 5th Birthday, Afif! ✨", sub: "" }
        ];

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.style.left = Math.random() * 100 + 'vw';
            balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.animationDuration = (Math.random() * 3 + 4) + 's';
            balloonZone.appendChild(balloon);
            setTimeout(() => balloon.remove(), 7000);
        }

        function runSequentialSlideshow() {
            const frame = document.getElementById('photo-frame');
            const images = frame.getElementsByTagName('img');
            
            if (giftScreenActive) return;

            if (!slideshowStarted) {
                slideshowStarted = true;
                frame.classList.add('visible');
            }

            for(let img of images) { img.classList.remove('active'); }

            images[currentImgIndex].classList.add('active');

            slideshowTimeout1 = setTimeout(() => {
                if (currentImgIndex === images.length - 1) {
                    return; 
                }

                images[currentImgIndex].classList.remove('active');

                slideshowTimeout2 = setTimeout(() => {
                    currentImgIndex++;
                    if (!track.paused && !track.ended) {
                        runSequentialSlideshow();
                    }
                }, 800);

            }, 2800); 
        }

        function openPresent() {
            giftScreenActive = false; 
            
            warmup.play().then(() => { warmup.pause(); }).catch(e => console.log(e));
            
            track.pause();
            track.currentTime = 0;

            giftScreen.style.opacity = '0';

            setTimeout(() => {
                giftScreen.style.display = 'none';
                stage.style.display = 'flex';
                stage.style.opacity = '1';
                creatorCredit.style.opacity = '1';
                
                startSilentBuildup();
            }, 500);
        }

        function startSilentBuildup() {
            track.pause();
            track.currentTime = 0;
            isMutedPeriod = true;

            greetingText.innerText = "Happy Birthday Afif!";
            subtitleText.innerText = "Happy 5th Birthday!";
            subtitleText.style.display = "block";
            
            document.body.style.backgroundColor = '#e0f7fa';
            document.body.classList.remove('dark-mode');
            document.getElementById('cake-container').classList.remove('show');
            document.getElementById('photo-frame').classList.remove('visible');
            
            const images = document.getElementById('photo-frame').getElementsByTagName('img');
            for(let img of images) { img.classList.remove('active'); }

            if(!balloonInterval) {
                balloonInterval = setInterval(createBalloon, 250);
            }

            // Force the stage display layout to show up safely now that curtains are open
            stage.style.display = 'flex';

            prePlayTimeout = setTimeout(() => {
                if (giftScreenActive) return; 
                isMutedPeriod = false; 
                
                document.body.style.backgroundColor = '#1a1a2e'; 
                document.body.classList.add('dark-mode');
                document.getElementById('cake-container').classList.add('show'); 
                
                greetingText.innerText = "🎶 Music Starting... 🎶";
                
                track.volume = 1.0;
                track.play().catch(error => {
                    greetingText.innerText = "Tap screen to hear music! 🎵";
                    const forcePlay = () => {
                        track.volume = 1.0;
                        track.play();
                        document.body.removeEventListener('click', forcePlay);
                    };
                    document.body.addEventListener('click', forcePlay);
                });
            }, 3000); 
        }

        /* Precision Sync Engine */
        track.addEventListener('timeupdate', () => {
            if (isMutedPeriod || giftScreenActive) return;

            const currentTime = track.currentTime;
            
            if (currentTime >= 12.0 && !slideshowStarted) {
                runSequentialSlideshow();
            }

            let currentLine = lyrics[0];
            for (let i = 0; i < lyrics.length; i++) {
                if (currentTime >= lyrics[i].time) {
                    currentLine = lyrics[i];
                }
            }
            
            if (greetingText.innerText !== currentLine.text) {
                greetingText.innerText = currentLine.text;
            }
            
            if (subtitleText.innerText !== currentLine.sub) {
                subtitleText.innerText = currentLine.sub;
                subtitleText.style.display = currentLine.sub === "" ? "none" : "block";
            }
        });

        /* TV-COMPATIBLE TIMING FIX */
        track.onended = () => {
            if (giftScreenActive) return;

            track.pause();
            track.currentTime = 0;

            // Instantly hide the stage layouts entirely so the TV browser doesn't leak old content
            stage.style.display = 'none';

            // Bring the curtains completely shut
            document.body.classList.add('curtains-closed');

            clearTimeout(slideshowTimeout1);
            clearTimeout(slideshowTimeout2);
            clearTimeout(prePlayTimeout);
            slideshowStarted = false;
            currentImgIndex = 0;

            // 4.5 seconds to ensure slow smart TV hardware registers the solid closed break
            setTimeout(() => {
                if (giftScreenActive) return;
                
                // Pull curtains open wide
                document.body.classList.remove('curtains-closed');
                
                // Allow a tiny delay for curtains to fully clear layout calculations on TVs before staging opens
                setTimeout(() => {
                    startSilentBuildup();
                }, 100);
            }, 4500); 
        };
    </script>
</body>
</html>
